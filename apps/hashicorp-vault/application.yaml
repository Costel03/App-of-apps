apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hashicorp-vault
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
  - repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.28.0
    helm:
      valueFiles:
      - $values/helm/hashicorp-vault/values.yaml
  - repoURL: https://github.com/Costel03/hashicorp-vault.git
    targetRevision: main
    ref: values
  - repoURL: https://github.com/Costel03/hashicorp-vault.git
    targetRevision: main
    path: external-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: hashicorp-vault

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
