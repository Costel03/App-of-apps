apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-ingress-harbor
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
  - repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.12.1
    helm:
      valueFiles:
      - $values/helm/nginx-ingress-harbor/values.yaml
  - repoURL: https://github.com/Costel03/nginx-ingress.git
    targetRevision: main
    ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx-harbor

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
