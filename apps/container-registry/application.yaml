apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
  - repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: 1.15.0
    helm:
      valueFiles:
      - $values/helm/harbor/values.yaml
  - repoURL: https://github.com/Costel03/container-registry-k8s.git
    targetRevision: main
    ref: values
  - repoURL: https://github.com/Costel03/container-registry-k8s.git
    targetRevision: main
    path: external-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: harbor

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
